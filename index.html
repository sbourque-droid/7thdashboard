<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Class Dashboard</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div>
    <div id="date">Loading date...</div>
    <div id="clock">Loading time...</div>
  </div>

  <div id="timer-display">00:00</div>
</header>

<main>

<!-- TIMER CONTROLS -->
<section class="panel">
  <h2>Timer</h2>

  <input id="minutesInput" type="number" placeholder="Minutes" min="1">

  <button onclick="startTimer()">Start</button>
  <button onclick="resetTimer()">Reset</button>

  <p id="timerStatus">Not running</p>
</section>

<!-- SPOTIFY -->
<section class="panel">
  <h2>Music</h2>

  <iframe style="border-radius:12px"
    src="https://open.spotify.com/embed/playlist/4iSCBPkvsmpIU1ZkQzuKrR"
    width="100%" height="352"
    frameborder="0"
    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
  </iframe>
</section>

<!-- GOOGLE SLIDES -->
<section class="panel">
  <h2>Slides</h2>

  <iframe
    src="https://docs.google.com/presentation/d/e/2PACX-1vResJllQgsLDia4zPqbVvu_OGGFI2w-AXodJxS_vYPDRTIaNyo9V2owkWxEbgISEO69IZsHrZLtzc3_"
    width="100%" height="352"
    allowfullscreen>
  </iframe>
</section>

<!-- GOOGLE FORM -->
<section class="panel">
  <h2>Form</h2>

  <iframe
    src="https://docs.google.com/forms/d/e/1FAIpQLSe9CI2RYNGuGlYdhrkW8iU03yK3fRSFGf5LwKk8nLdrNJiZ8A/viewform?usp=header"
    width="100%" height="352">
  </iframe>
</section>

</main>

<script src="script.js"></script>
</body>
</html>
